# Default values for mediamarkt.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/mateo2335/mediamarktdemo
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "sha-00ba440"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1001

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: mediamarkt.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: mediamarkt-tls
  #    hosts:
  #      - mediamarkt.local

resources:
  # We specify reasonable default limits/requests for a Next.js application
  limits:
    cpu: 1
    memory: 1024Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional environment variables to pass to the container
env: {}
# Example:
#   PORT: "3000"
#   NEXT_PUBLIC_API_URL: "https://api.mediamarkt.local"

# EnvFrom allows referencing ConfigMaps or Secrets directly as env variables
envFrom: []

nodeSelector: {}

tolerations: []

affinity: {}
